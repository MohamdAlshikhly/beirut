name: Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Windows support
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Bundle Visual C++ Runtime DLLs
        shell: pwsh
        run: |
          $vcRedistBase = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC"
          $latestVer = Get-ChildItem $vcRedistBase | Sort-Object Name -Descending | Select-Object -First 1
          $crtPath = Join-Path $latestVer.FullName "x64\Microsoft.VC143.CRT"
          $dest = "build\windows\x64\runner\Release"
          $dlls = @("msvcp140.dll","msvcp140_1.dll","msvcp140_2.dll","vcruntime140.dll","vcruntime140_1.dll","concrt140.dll")
          foreach ($dll in $dlls) {
            $src = Join-Path $crtPath $dll
            if (Test-Path $src) { Copy-Item $src $dest }
          }
          Write-Host "Bundled VC++ runtime DLLs successfully."

      - name: Create Release ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath beirut-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: beirut-windows.zip
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
